/* =========================
   ОСНОВНЫЕ СТИЛИ
========================= */

*{

body{

/* =========================

/* =========================
   ГЛАВНОЕ МЕНЮ
========================= */

.topbar{
    background:#ffffff;

    gap:6px;
    justify-content:center;
    border-bottom:3px solid #d4af37;

    z-index:100;

.topbar button{
    flex:1;

    border:none;
    padding:10px 5px;

    font-size:12px;
    font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

    transform:scale(.96);
}


/* =========================
   КОНТЕЙНЕР
========================= */

.container{
    max-width:500px;

   СТРАНИЦЫ

/* =========================
   КНОПКИ
========================= */

    margin-top:10px;

    padding:12px;

    font-weight:bold;

    cursor:pointer;

    font-size:14px;

}


.delivery-btn{

    background:linear-gradient(

        #27ae60,

    color:#ffffff;

}

        135deg,
        #3498db,
        #85c1e9
    );

}


.confirm-pickup-btn{

    background:linear-gradient(
        135deg,
        #27ae60,
        #58d68d
    );

    color:#ffffff;

    font-size:16px;

    padding:15px;

}


.confirm-pickup-btn:disabled{

    opacity:.6;

}


/* =========================
   SUCCESS
========================= */

.success{

    background:#27ae60;

    color:#ffffff;

    border-radius:12px;

    margin-bottom:15px;

    text-align:center;

}

========================= */

    padding:15px;

    font-weight:bold;

    margin-bottom:15px;

    box-shadow:
    0 8px 20px
    rgba(0,0,0,.12);

}

        #fff3b0,
        #d4af37
    );

}


.gold{

    background:linear-gradient(
        135deg,

    );

}


.silver{

    background:linear-gradient(

}


.newbie{

}


/* =========================

========================= */

.filterbar{

}

    margin-bottom:10px;

    box-shadow:
    0 5px 15px
    rgba(0,0,0,.08);

}

}


/* =========================

.ready-box{

    background:linear-gradient(

    );

}

/* =========================

.delivery-info{

}


/* =========================

========================= */

.confirm-box{

    background:#ffffff;

    padding:15px;

    border-radius:15px;

    margin-bottom:15px;

    border-left:5px solid #27ae60;

    box-shadow:
    0 6px 18px
    rgba(0,0,0,.08);

}


.confirm-title{

    font-size:18px;

    font-weight:bold;

    margin-bottom:8px;

}


/* =========================
   ПУСТО
========================= */

.empty{

    text-align:center;

    padding:25px 10px;

    color:#777;

}


/* =========================
   ЗАГРУЗКА
========================= */

.loading{

    text-align:center;

    padding:20px;

    color:#777;

}


/* =========================
   МОБИЛЬНЫЙ ЭКРАН
========================= */

@media(max-width:380px){

    .topbar button{

        font-size:10px;

}

/* =========================
   API
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";


let currentFilter = "all";

let allParcels = [];

let pickupRequestSent = false;


/* =========================
   ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
========================= */

function showPage(id){

    document
    .querySelectorAll(".page")
    .forEach(function(page){

        page.classList.remove("active");

    });


    const selectedPage =
    document.getElementById(id);


    if(selectedPage){

        selectedPage.classList.add("active");

    }


    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

}


/* =========================
   TELEGRAM ID
========================= */

function getTG(){

    try{

        if(
            window.Telegram &&
            Telegram.WebApp
        ){

            Telegram.WebApp.ready();


            const user =
            Telegram.WebApp
            .initDataUnsafe
            ?.user;


            if(
                user &&
                user.id
            ){

                return user.id.toString();

            }

        }

    }catch(e){

        console.log(e);

    }


    return new URLSearchParams(
        window.location.search
    ).get("tg_id");

}


/* =========================
   КОПИРОВАТЬ АДРЕС
========================= */

function copyAddress(){

    const text =
    document
    .getElementById("warehouseText")
    .innerText;


    if(
        navigator.clipboard
    ){

        navigator.clipboard
        .writeText(text)
        .then(function(){

            showSuccess(
                "✅ Адрес успешно скопирован"
            );

        });

    }else{

        alert(
            "Скопируйте адрес вручную"
        );

    }

}


/* =========================
   SUCCESS
========================= */

function showSuccess(text){

    const box =
    document
    .getElementById("success");


    box.innerText = text;


    box.style.display =
    "block";


    setTimeout(function(){

        box.style.display =
        "none";

    },4000);

}


/* =========================
   СТАТУС ПОСЫЛКИ
========================= */

function getStatus(i){

    let status =
    (i.status || "")
    .toLowerCase()
    .trim();


    if(
        status === "китай"
    ){

        return {

            key:"china",

            text:"🇨🇳 На складе в Китае"

        };

    }


    if(
        status === "в путь" ||
        status === "в пути"
    ){

        return {

            key:"way",

            text:"🚚 В пути"

        };

    }


    if(
        status === "офис"
    ){

        return {

            key:"office",

            text:"🏢 В офисе — можно забрать"

        };

    }


    if(
        status === "выдано"
    ){

        return {

            key:"issued",

            text:"✅ Выдано"

        };

    }


    return {

        key:"other",

        text:"⏳ Обработка"

    };

}


/* =========================
   ФИЛЬТР
========================= */

function setFilter(type,button){

    currentFilter =
    type;


    document
    .querySelectorAll(
        ".filterbar button"
    )
    .forEach(function(btn){

        btn.classList.remove(
            "active"
        );

    });


    if(button){

        button.classList.add(
            "active"
        );

    }


    renderParcels();

}


/* =========================
   ПОКАЗ ПОСЫЛОК
========================= */

function renderParcels(){

    let filtered =
    allParcels.filter(function(item){

        if(
            currentFilter ===
            "all"
        ){

            return true;

        }


        return (
            item.status ===
            currentFilter
        );

    });


    let html = "";


    if(
        filtered.length === 0
    ){

        html = `

        <div class="card empty">

            📦 Посылок нет

        </div>

        `;

    }else{


        filtered.forEach(function(item){

            html += `

            <div class="parcel">

                📦
                <b>Трек:</b>
                ${item.track || "-"}

                <br><br>

                📊
                <b>Статус:</b>
                ${item.statusText || "-"}

                <br><br>

                💰
                <b>Цена:</b>
                ${item.price || 0} сом

                <br><br>

                📅
                <b>Дата отправки:</b>
                ${item.send_date || "-"}

                <br><br>

                ⏳
                <b>Ожидаемое прибытие:</b>
                ${item.expected || "-"}

            </div>

            `;

        });

    }


    document
    .getElementById(
        "parcelList"
    )
    .innerHTML =
    html;

}


/* =========================
   СТРАНИЦА ЕДУ ЗА ПОСЫЛКАМИ
========================= */

function renderPickup(){

    const officeParcels =
    allParcels.filter(function(item){

        return item.status ===
        "office";

    });


    let total = 0;


    officeParcels.forEach(function(item){

        total += Number(
            item.price || 0
        );

    });


    let html = "";


    /*
     * НЕТ ГОТОВЫХ ПОСЫЛОК
     */

    if(
        officeParcels.length === 0
    ){

        html = `

        <div class="card empty">

            📦 У вас пока нет посылок,
            готовых к выдаче.

            <br><br>

            Когда ваша посылка
            поступит в наш офис,
            она появится здесь.

        </div>

        `;

    }


    /*
     * ЕСТЬ ГОТОВЫЕ ПОСЫЛКИ
     */

    else{


        html += `

        <div class="ready-box">

            <div>
                📦 Готово к выдаче
            </div>

            <div class="ready-number">
                ${officeParcels.length}
            </div>

            <div>
                посылок
            </div>

            <div class="total-price">
                💰 ${total} сом
            </div>

        </div>

        `;


        officeParcels.forEach(function(item){

            html += `

            <div class="parcel">

                📦
                <b>Трек:</b>
                ${item.track || "-"}

                <br><br>

                🏢
                <b>Статус:</b>
                Готово к получению

                <br><br>

                💰
                <b>К оплате:</b>
                ${item.price || 0} сом

            </div>

            `;

        });


        /*
         * КНОПКА ПОДТВЕРЖДЕНИЯ
         */

        if(!pickupRequestSent){

            html += `

            <div class="confirm-box">

                <div class="confirm-title">
                    🚚 Едете за посылками?
                </div>

                <p>
                    Подтвердите, что вы едете
                    за посылками. Мы подготовим
                    их к выдаче.
                </p>

                <button
                    type="button"
                    class="confirm-pickup-btn"
                    onclick="confirmPickup()"
                >
                    ✅ Да, я еду за посылками
                </button>

            </div>

            `;

        }else{

            html += `

            <div class="card">

                <h3>
                    ✅ Заявка отправлена
                </h3>

                <p>
                    Мы получили вашу заявку
                    и подготовим посылки
                    к вашему приезду.
                </p>

            </div>

            `;

        }

    }


    /*
     * ИНФОРМАЦИЯ О ПУНКТЕ
     */

    html += `

    <div class="delivery-info">

        <h3>
            📍 Пункт выдачи Tez Kargo
        </h3>

        <p>
            🏢 Наш адрес в Токмоке
        </p>

        <p>
            🕘 Время работы:
            10:00–18:00
        </p>

        <button
            type="button"
            class="route-btn"
            onclick="openRoute()"
        >
            📍 Открыть Tez Kargo в 2GIS
        </button>

        <button
            type="button"
            class="delivery-btn"
            onclick="requestDelivery()"
        >
            🚕 Заказать доставку домой
        </button>

    </div>

    `;


    document
    .getElementById(
        "pickupContent"
    )
    .innerHTML =
    html;

}


/* =========================
   ПОДТВЕРЖДЕНИЕ:
   Я ЕДУ ЗА ПОСЫЛКАМИ
========================= */

function confirmPickup(){

    if(pickupRequestSent){

        alert(
            "✅ Вы уже отправили заявку."
        );

        return;

    }


    const tg_id =
    getTG();


    if(!tg_id){

        alert(
            "⚠️ Не удалось определить Telegram ID."
        );

        return;

    }


    const officeParcels =
    allParcels.filter(function(item){

        return item.status ===
        "office";

    });


    if(
        officeParcels.length === 0
    ){

        alert(
            "📦 У вас нет посылок, готовых к выдаче."
        );

        return;

    }


    let total = 0;


    officeParcels.forEach(function(item){

        total += Number(
            item.price || 0
        );

    });


    /*
     * ПЕРЕД ОТПРАВКОЙ
     * ПОЛУЧАЕМ ПРОФИЛЬ
     */

    fetch(

        API_URL +

        "?action=profile&tg_id=" +

        encodeURIComponent(
            tg_id
        )

    )


    .then(function(response){

        return response.json();

    })


    .then(function(profile){

        if(
            !profile ||
            profile.status !==
            "ok"
        ){

            alert(
                "⚠️ Не удалось получить данные клиента."
            );

            return;

        }


        /*
         * ПОДТВЕРЖДЕНИЕ
         */

        const confirmText =

        "🚚 Вы подтверждаете, что едете за посылками?\n\n" +

        "👤 Клиент: " +
        (profile.name || "-") +

        "\n📦 Посылок: " +
        officeParcels.length +

        "\n💰 Сумма: " +
        total +
        " сом";


        const confirmed =
        confirm(
            confirmText
        );


        if(!confirmed){

            return;

        }


        /*
         * ПОКАЗЫВАЕМ ЗАГРУЗКУ
         */

        const button =
        document
        .querySelector(
            ".confirm-pickup-btn"
        );


        if(button){

            button.disabled =
            true;

            button.innerText =
            "⏳ Отправляем заявку...";

        }


        /*
         * ФОРМИРУЕМ ЗАПРОС
         */

        const url =

        API_URL +

        "?action=pickup_confirm" +

        "&tg_id=" +

        encodeURIComponent(
            tg_id
        ) +

        "&client_code=" +

        encodeURIComponent(
            profile.client_code ||
            ""
        ) +

        "&name=" +

        encodeURIComponent(
            profile.name ||
            ""
        ) +

        "&phone=" +

        encodeURIComponent(
            profile.phone ||
            ""
        ) +

        "&parcel_count=" +

        encodeURIComponent(
            officeParcels.length
        ) +

        "&total=" +

        encodeURIComponent(
            total
        );


        /*
         * ОТПРАВКА
         */

        fetch(url)
