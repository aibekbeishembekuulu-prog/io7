<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{  
    font-family: Arial;  
    margin:0;  
    background: linear-gradient(135deg, #f7f1e3, #fffaf0);  
}  
  
/* LOGO */  
.logo{  
    width:120px;  
    display:block;  
    margin:15px auto 5px auto;  
}  
  
/* TOP BAR */  
.topbar{  
    background: #ffffff;  
    padding:10px;  
    display:flex;  
    gap:8px;  
    justify-content:center;  
    flex-wrap:wrap;  
    border-bottom:3px solid #d4af37;  
    position:sticky;  
    top:0;  
    z-index:10;  
}  
  
.topbar button{  
    background: linear-gradient(135deg, #d4af37, #f5d76e);  
    color:#2c2c2c;  
    border:none;  
    padding:8px 12px;  
    border-radius:10px;  
    font-weight:bold;  
    box-shadow:0 3px 8px rgba(0,0,0,0.15);  
}  
  
/* CONTAINER */  
.container{  
    max-width:500px;  
    margin:auto;  
    padding:15px;  
}  
  
/* CARDS */  
.card{  
    background:#fff;  
    padding:15px;  
    border-radius:15px;  
    margin-bottom:12px;  
    box-shadow:0 6px 18px rgba(0,0,0,0.08);  
    border-left:5px solid #d4af37;  
}  
  
/* CODE BOX */  
.code-box{  
    background: linear-gradient(135deg, #d4af37, #f5d76e);  
    color:#2c2c2c;  
    padding:15px;  
    border-radius:15px;  
    text-align:center;  
    margin-bottom:15px;  
    box-shadow:0 8px 20px rgba(0,0,0,0.15);  
}  
  
.code{  
    font-size:22px;  
    font-weight:bold;  
}  
  
/* WAREHOUSE */  
.warehouse{  
    background:#fff;  
    padding:15px;  
    border-radius:15px;  
    border-left:5px solid #d4af37;  
    margin-bottom:15px;  
    white-space:pre-line;  
}  
  
/* BUTTON */  
.copy-btn{  
    margin-top:10px;  
    background: linear-gradient(135deg, #d4af37, #f5d76e);  
    color:#2c2c2c;  
    border:none;  
    padding:10px;  
    border-radius:10px;  
    width:100%;  
    font-weight:bold;  
}  
  
/* SUCCESS */  
.success{  
    background:#27ae60;  
    color:#fff;  
    padding:12px;  
    border-radius:12px;  
    margin-bottom:15px;  
    display:none;  
}  
  
/* LEVEL BOX */  
.level-box{  
    padding:15px;  
    border-radius:15px;  
    color:#2c2c2c;  
    font-weight:bold;  
    text-align:center;  
    margin-bottom:15px;  
    box-shadow:0 8px 20px rgba(0,0,0,0.12);  
}  
  
.vip{  
    background: linear-gradient(135deg,#fff3b0,#d4af37);  
}  
  
.gold{  
    background: linear-gradient(135deg,#f9e79f,#d4af37);  
}  
  
.silver{  
    background: linear-gradient(135deg,#f0e6c8,#c0c0c0);  
}  
  
.newbie{  
    background: linear-gradient(135deg,#f7f1e3,#e0c97f);  
}  
  
/* PAGES */  
.page{display:none;}  
.page.active{display:block;}  
</style>
</style>
</head>

<body>

<img src="logo.jpg" class="logo">

<div class="topbar">
    <button onclick="showPage('home')">Главная</button>
    <button onclick="showPage('parcels')">Мои посылки</button>
</div>

<div class="container">

<h2>👤 Личный кабинет</h2>

<div id="success" class="success"></div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card header">⏳ Загрузка...</div>
<div class="card phone">📱 Телефон...</div>

<div class="code-box">
Ваш клиентский код<br>
<div class="code">---</div>
</div>

<div class="warehouse">
<div id="warehouseText">⏳ Загрузка...</div>
<button class="copy-btn" onclick="copyAddress()">📋 Скопировать адрес</button>
</div>

<div class="card bonus">💰 Бонус...</div>
<div class="card total-bonus">💎 Общий бонус...</div>

<div id="levelBox" class="level-box">⏳ Уровень...</div>

</div>

<!-- PARCELS -->
<div id="parcels" class="page">

<div class="topbar">
    <button onclick="setFilter('all')">Все</button>
    <button onclick="setFilter('china')">🇨🇳 Китай</button>
    <button onclick="setFilter('way')">🚚 В пути</button>
    <button onclick="setFilter('office')">🏢 Офис</button>
    <button onclick="setFilter('issued')">✅ Выдано</button>
</div>

<div class="card">
    <h3>📦 Мои посылки</h3>
    <div id="parcelList">Загрузка...</div>
</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";

let lastHash = "";
let currentFilter = "all";

function showPage(id){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function setFilter(type){
    currentFilter = type;
    loadClient();
}

function getTG(){
    try{
        if(window.Telegram && Telegram.WebApp){
            Telegram.WebApp.ready();
            const user = Telegram.WebApp.initDataUnsafe?.user;
            if(user && user.id) return user.id.toString();
        }
    }catch(e){}
    return new URLSearchParams(window.location.search).get("tg_id");
}

function copyAddress(){
    const text = document.getElementById("warehouseText").innerText;
    navigator.clipboard.writeText(text);
    alert("Скопировано!");
}

function getStatus(i){

    let status = (i.status || "").toLowerCase().trim();

    if(status === "китай")
        return {key:"china", text:"🇨🇳 На складе в Китае"};

    if(status === "в путь" || status === "в пути")
        return {key:"way", text:"🚚 В пути"};

    if(status === "офис")
        return {key:"office", text:"🏢 В офисе"};

    if(status === "выдано")
        return {key:"issued", text:"✅ Выдано"};

    return {key:"other", text:"⏳ Обработка"};
}

function loadClient(){

    const tg_id = getTG();
    if(!tg_id) return;

    fetch(API_URL + "?action=profile&tg_id=" + tg_id)
    .then(r => r.json())
    .then(data => {

        if(!data || data.status !== "ok") return;

        document.querySelector(".header").innerHTML = "👤 Имя: " + (data.name || "-");
        document.querySelector(".phone").innerHTML = "📱 Телефон: " + (data.phone || "нет данных");
        document.querySelector(".bonus").innerHTML = "💰 Бонус: " + (data.balance || 0) + " сом";
        document.querySelector(".total-bonus").innerHTML = "💎 Общий бонус: " + (data.total_balance || 0) + " сом";
        document.querySelector(".code").innerText = data.client_code || "---";

        document.getElementById("warehouseText").innerText =
`📦 Адрес склада:
${data.address_warehouse || "нет данных"}`;

        let total = Number(data.total_balance || 0);

        let level = "🥉 Бронза";
        let levelClass = "newbie";

        if(total >= 1000){
            level = "💎 VIP 👑"; levelClass = "vip";
        } else if(total >= 800){
            level = "🥇 Золото"; levelClass = "gold";
        } else if(total >= 600){
            level = "🥈 Серебро"; levelClass = "silver";
        }

        document.getElementById("levelBox").className = "level-box " + levelClass;
        document.getElementById("levelBox").innerHTML = "🏆 Уровень: " + level;
    });

    fetch(API_URL + "?action=all&tg_id=" + tg_id)
    .then(r => r.json())
    .then(p => {

        let all = [];

        if(Array.isArray(p.office)){
            p.office.forEach(i => {
                all.push({
                    track: i.track,
                    status: "office",
                    statusText: "🏢 В офисе",
                    price: i.price,
                    send_date: i.date_sent,
                    expected: i.date_arrived
                });
            });
        }

        if(Array.isArray(p.way)){
            p.way.forEach(i => {
                let st = getStatus(i);
                all.push({
                    track: i.track,
                    status: st.key,
                    statusText: st.text,
                    price: i.price,
                    send_date: i.date_sent,
                    expected: i.date_arrived
                });
            });
        }

        let filtered = all.filter(i => {
            if(currentFilter === "all") return true;
            return i.status === currentFilter;
        });

        let html = "";

        if(filtered.length === 0){
            html = "<p>Нет посылок</p>";
        } else {
            filtered.forEach(item => {
                html += `
                <div class="card">
                    📦 Трек: ${item.track}<br>
                    📊 Статус: ${item.statusText}<br>
                    💰 Цена: ${item.price || 0} сом<br>
                    📅 Дата отправки: ${item.send_date || "-"}<br>
                    ⏳ Ожидаемое прибытие: ${item.expected || "-"}
                </div>`;
            });
        }

        document.getElementById("parcelList").innerHTML = html;
    });
}

window.onload = loadClient;

</script>
</body>
</html>
