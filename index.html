<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial;
    background:#eef1f6;
    margin:0;
}

.logo{
    width:120px;
    display:block;
    margin:15px auto 5px auto;
}

.topbar{
    background:#fff;
    padding:10px;
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    border-bottom:3px solid #e74c3c;
    position:sticky;
    top:0;
    z-index:10;
}

.topbar button{
    background:#e74c3c;
    color:#fff;
    border:none;
    padding:8px 10px;
    border-radius:10px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:auto;
    padding:15px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:15px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.code-box{
    background:#e74c3c;
    color:#fff;
    padding:15px;
    border-radius:15px;
    text-align:center;
    margin-bottom:15px;
}

.code{font-size:22px;font-weight:bold;}

.warehouse{
    background:#fff;
    padding:15px;
    border-radius:15px;
    border-left:5px solid #e74c3c;
    margin-bottom:15px;
    white-space:pre-line;
}

.copy-btn{
    margin-top:10px;
    background:#2ecc71;
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    width:100%;
    font-weight:bold;
}

.level-box{
    padding:15px;
    border-radius:15px;
    color:#fff;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}

.vip{background:linear-gradient(135deg,#8e44ad,#6c5ce7);}
.gold{background:linear-gradient(135deg,#f1c40f,#f39c12); color:#000;}
.silver{background:linear-gradient(135deg,#bdc3c7,#95a5a6); color:#000;}
.newbie{background:linear-gradient(135deg,#2ecc71,#27ae60);}

.page{display:none;}
.page.active{display:block;}

/* ===== TRACK ROAD ===== */
.track-box{
    background:#fff;
    padding:15px;
    border-radius:15px;
    margin-top:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.track-title{
    font-weight:bold;
    margin-bottom:10px;
}

.road-line{
    position:relative;
    height:80px;
}

.line{
    position:absolute;
    top:35px;
    left:0;
    right:0;
    height:6px;
    background:#2c3e50;
    border-radius:10px;
}

.dot{
    position:absolute;
    top:28px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:#bdc3c7;
    border:3px solid #fff;
    box-shadow:0 0 0 2px #ccc;
}

.dot.active{
    background:#2ecc71;
    box-shadow:0 0 0 2px #2ecc71;
}

.d1{left:5%;}
.d2{left:35%;}
.d3{left:65%;}
.d4{left:90%;}

.label2{
    position:absolute;
    top:55px;
    font-size:11px;
    color:#555;
    transform:translateX(-30%);
}

.truck{
    position:absolute;
    top:5px;
    font-size:26px;
    transition:all 0.8s ease;
}
</style>
</head>

<body>

<img src="logo.jpg" class="logo">

<div class="topbar">
    <button onclick="showPage('home')">Главная</button>
    <button onclick="showPage('parcels')">Мои посылки</button>
</div>

<div class="container">

<h2>👤 Личный кабинет</h2>

<!-- HOME -->
<div id="home" class="page active">

<div class="card header">⏳ Загрузка...</div>
<div class="card phone">📱 Телефон...</div>

<div class="code-box">
Ваш клиентский код<br>
<div class="code">---</div>
</div>

<div class="warehouse">
<div id="warehouseText">⏳ Загрузка...</div>
<button class="copy-btn" onclick="copyAddress()">📋 Скопировать</button>
</div>

<div class="card bonus"></div>
<div class="card total-bonus"></div>

<div id="levelBox" class="level-box">⏳ Уровень...</div>

</div>

<!-- PARCELS -->
<div id="parcels" class="page">

<div class="card">
    <h3>📦 Мои посылки</h3>
    <div id="parcelList">Загрузка...</div>
</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";

let currentFilter = "all";

function showPage(id){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function getTG(){
    try{
        if(window.Telegram && Telegram.WebApp){
            Telegram.WebApp.ready();
            return Telegram.WebApp.initDataUnsafe?.user?.id;
        }
    }catch(e){}
    return new URLSearchParams(location.search).get("tg_id");
}

function copyAddress(){
    navigator.clipboard.writeText(document.getElementById("warehouseText").innerText);
    alert("Скопировано");
}

function loadClient(){

const tg_id = getTG();
if(!tg_id) return;

fetch(API_URL + "?action=profile&tg_id=" + tg_id)
.then(r => r.json())
.then(data => {

document.querySelector(".header").innerHTML = "👤 Имя: " + data.name;
document.querySelector(".phone").innerHTML = "📱 Телефон: " + data.phone;
document.querySelector(".bonus").innerHTML = "💰 Бонус: " + data.balance;
document.querySelector(".total-bonus").innerHTML = "💎 Общий бонус: " + data.total_balance;
document.querySelector(".code").innerText = data.client_code;

document.getElementById("warehouseText").innerText =
"📦 Адрес склада:\n" + data.address_warehouse;

let level="🥉 Бронза", cls="newbie";
if(data.total_balance>=1000){level="💎 VIP";cls="vip";}
else if(data.total_balance>=800){level="🥇 Золото";cls="gold";}
else if(data.total_balance>=600){level="🥈 Серебро";cls="silver";}

document.getElementById("levelBox").className="level-box "+cls;
document.getElementById("levelBox").innerText="🏆 "+level;
});

fetch(API_URL + "?action=all&tg_id=" + tg_id)
.then(r => r.json())
.then(p => {

let all=[];

if(Array.isArray(p.way)){
p.way.forEach(i=>{
all.push({
track:i.track,
status:i.status,
price:i.price,
send:i.date_sent,
arrive:i.date_arrived
});
});
}

let html="";

all.forEach(item=>{

let pos="5%";
let d=["","","",""];

if(item.status=="way"){pos="35%";d[1]="active";}
if(item.status=="office"){pos="65%";d[2]="active";}
if(item.status=="issued"){pos="90%";d[3]="active";}
if(item.status=="china"){pos="5%";d[0]="active";}

html+=`
<div class="track-box">

<div class="track-title">📦 ${item.track}</div>

<div class="road-line">

<div class="truck" style="left:${pos}">🚚</div>
<div class="line"></div>

<div class="dot ${d[0]} d1"></div>
<div class="dot ${d[1]} d2"></div>
<div class="dot ${d[2]} d3"></div>
<div class="dot ${d[3]} d4"></div>

<div class="label2" style="left:5%">Китай</div>
<div class="label2" style="left:35%">В пути</div>
<div class="label2" style="left:65%">Офис</div>
<div class="label2" style="left:90%">Выдано</div>

</div>

📊 ${item.status}<br>
💰 ${item.price} сом<br>
📅 ${item.send}
</div>
`;
});

document.getElementById("parcelList").innerHTML=html;

});
}

window.onload=loadClient;

</script>

</body>
</html>
