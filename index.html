<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: linear-gradient(180deg,#f5f7fb,#eef1f6);
    margin:0;
    color:#1f2937;
}

/* LOGO */
.logo{
    width:110px;
    display:block;
    margin:15px auto 8px auto;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* TOPBAR */
.topbar{
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding:10px;
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.topbar button{
    background: linear-gradient(135deg,#e74c3c,#ff6b6b);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:12px;
    font-weight:600;
    font-size:13px;
    box-shadow:0 5px 12px rgba(231,76,60,0.25);
}

/* CONTAINER */
.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:18px;
    margin-bottom:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
    border:1px solid rgba(0,0,0,0.04);
    transition:0.2s;
}

.card:active{
    transform:scale(0.99);
}

/* CODE */
.code-box{
    background: linear-gradient(135deg,#e74c3c,#ff7675);
    color:#fff;
    padding:18px;
    border-radius:18px;
    text-align:center;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(231,76,60,0.25);
}

.code{
    font-size:26px;
    font-weight:800;
    letter-spacing:2px;
}

/* WAREHOUSE */
.warehouse{
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding:15px;
    border-radius:18px;
    border-left:5px solid #e74c3c;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* BUTTON */
.copy-btn{
    margin-top:12px;
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color:#fff;
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-weight:700;
}

/* SUCCESS */
.success{
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color:#fff;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    display:none;
}

/* LEVEL */
.level-box{
    padding:16px;
    border-radius:18px;
    color:#fff;
    font-weight:700;
    text-align:center;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.vip{background:linear-gradient(135deg,#8e44ad,#6c5ce7);}
.gold{background:linear-gradient(135deg,#f1c40f,#f39c12); color:#000;}
.silver{background:linear-gradient(135deg,#bdc3c7,#95a5a6); color:#000;}
.newbie{background:linear-gradient(135deg,#2ecc71,#27ae60);}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

h2{
    font-size:18px;
    text-align:center;
    margin:10px 0 15px;
}
</style>
</head>

<body>

<img src="logo.jpg" class="logo">

<div class="topbar">
    <button onclick="showPage('home')">Главная</button>
    <button onclick="showPage('parcels')">Посылки</button>
</div>

<div class="container">

<h2>👤 Личный кабинет</h2>

<div id="success" class="success"></div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card header">⏳ Загрузка...</div>
<div class="card phone">📱 Телефон...</div>

<div class="code-box">
Ваш клиентский код<br>
<div class="code">---</div>
</div>

<div class="warehouse">
<div id="warehouseText">⏳ Загрузка...</div>
<button class="copy-btn" onclick="copyAddress()">📋 Скопировать адрес</button>
</div>

<div class="card bonus">💰 Бонус...</div>
<div class="card total-bonus">💎 Общий бонус...</div>

<div id="levelBox" class="level-box">⏳ Уровень...</div>

</div>

<!-- PARCELS -->
<div id="parcels" class="page">

<div class="topbar">
    <button onclick="setFilter('all')">Все</button>
    <button onclick="setFilter('china')">🇨🇳 Китай</button>
    <button onclick="setFilter('way')">🚚 В пути</button>
    <button onclick="setFilter('office')">🏢 Офис</button>
    <button onclick="setFilter('issued')">✅ Выдано</button>
</div>

<div class="card">
    <h3>📦 Мои посылки</h3>
    <div id="parcelList">Загрузка...</div>
</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";

let currentFilter = "all";

function showPage(id){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function setFilter(type){
    currentFilter = type;
    loadClient();
}

function getTG(){
    try{
        if(window.Telegram && Telegram.WebApp){
            Telegram.WebApp.ready();
            const user = Telegram.WebApp.initDataUnsafe?.user;
            if(user && user.id) return user.id.toString();
        }
    }catch(e){}
    return new URLSearchParams(window.location.search).get("tg_id");
}

function copyAddress(){
    const text = document.getElementById("warehouseText").innerText;
    navigator.clipboard.writeText(text);
    alert("Скопировано!");
}

function getStatus(i){

    let status = (i.status || "").toLowerCase().trim();

    if(status === "китай") return {key:"china", text:"🇨🇳 Китай"};
    if(status === "в путь" || status === "в пути") return {key:"way", text:"🚚 В пути"};
    if(status === "офис") return {key:"office", text:"🏢 Офис"};
    if(status === "выдано") return {key:"issued", text:"✅ Выдано"};

    return {key:"other", text:"⏳ Обработка"};
}

function loadClient(){

    const tg_id = getTG();
    if(!tg_id) return;

    fetch(API_URL + "?action=profile&tg_id=" + tg_id)
    .then(r => r.json())
    .then(data => {

        if(!data || data.status !== "ok") return;

        document.querySelector(".header").innerHTML = "👤 " + (data.name || "-");
        document.querySelector(".phone").innerHTML = "📱 " + (data.phone || "-");
        document.querySelector(".bonus").innerHTML = "💰 Бонус: " + (data.balance || 0) + " сом";
        document.querySelector(".total-bonus").innerHTML = "💎 Всего: " + (data.total_balance || 0) + " сом";
        document.querySelector(".code").innerText = data.client_code || "---";

        document.getElementById("warehouseText").innerText =
`📦 Адрес склада:
${data.address_warehouse || "нет данных"}`;

        let total = Number(data.total_balance || 0);

        let level = "🥉 Бронза";
        let cls = "newbie";

        if(total >= 1000){ level="💎 VIP"; cls="vip"; }
        else if(total >= 800){ level="🥇 Золото"; cls="gold"; }
        else if(total >= 600){ level="🥈 Серебро"; cls="silver"; }

        document.getElementById("levelBox").className = "level-box " + cls;
        document.getElementById("levelBox").innerHTML = "🏆 " + level;
    });

    fetch(API_URL + "?action=all&tg_id=" + tg_id)
    .then(r => r.json())
    .then(p => {

        let all = [];

        if(Array.isArray(p.office)){
            p.office.forEach(i => {
                all.push({
                    track:i.track,
                    status:"office",
                    statusText:"🏢 Офис",
                    price:i.price,
                    send_date:i.date_sent,
                    expected:i.date_arrived
                });
            });
        }

        if(Array.isArray(p.way)){
            p.way.forEach(i => {
                let st = getStatus(i);
                all.push({
                    track:i.track,
                    status:st.key,
                    statusText:st.text,
                    price:i.price,
                    send_date:i.date_sent,
                    expected:i.date_arrived
                });
            });
        }

        let filtered = all.filter(i => currentFilter==="all" ? true : i.status===currentFilter);

        let html = "";

        if(filtered.length === 0){
            html = "<p>Нет посылок</p>";
        } else {
            filtered.forEach(i=>{
                html += `
                <div class="card">
                    📦 ${i.track}<br>
                    📊 ${i.statusText}<br>
                    💰 ${i.price} сом<br>
                    📅 ${i.send_date || "-"} → ${i.expected || "-"}
                </div>`;
            });
        }

        document.getElementById("parcelList").innerHTML = html;
    });
}

window.onload = loadClient;

</script>

</body>
</html>
