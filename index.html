}

        135deg,

        #f7f1e3,

}


/* =========================

.filterbar{

    padding:
    5px 0 10px;

/* =========================

.ready-box{

    background:
    linear-gradient(
        135deg,
        #d4af37,
        #f5d76e
    );

    padding:18px;

    border-radius:15px;

    text-align:center;

    margin-bottom:15px;

    box-shadow:
    0 8px 20px
    rgba(0,0,0,.15);

}


.ready-number{

    font-size:32px;

}


.total-price{

/* =========================

.delivery-info{

}


/* =========================

}

/* =========================
   API
========================= */

const API_URL =

"https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";


let currentFilter = "all";


let allParcels = [];



/* =========================
   ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
========================= */

function showPage(id){


document

.querySelectorAll(".page")

.forEach(

p =>

p.classList.remove("active")

);


document

.getElementById(id)

.classList.add("active");


window.scrollTo({

top:0,

behavior:"smooth"

});


}



/* =========================
   TELEGRAM ID
========================= */

function getTG(){


try{


if(

window.Telegram &&

Telegram.WebApp

){


Telegram.WebApp.ready();


const user =

Telegram.WebApp

.initDataUnsafe

?.user;


if(

user &&

user.id

){


return user.id.toString();


}


}


}catch(e){


console.log(e);


}


return new URLSearchParams(

window.location.search

).get("tg_id");


}



/* =========================
   КОПИРОВАТЬ АДРЕС
========================= */

function copyAddress(){


const text =

document

.getElementById(

"warehouseText"

)

.innerText;


if(

navigator.clipboard

){


navigator.clipboard

.writeText(text)

.then(

() => {


showSuccess(

"✅ Адрес успешно скопирован"

);


}

);


}else{


alert(

"Скопируйте адрес вручную"

);


}


}



/* =========================
   SUCCESS
========================= */

function showSuccess(text){


const box =

document

.getElementById(

"success"

);


box.innerText = text;


box.style.display =

"block";


setTimeout(

() => {


box.style.display =

"none";


},

3000

);


}



/* =========================
   СТАТУС
========================= */

function getStatus(i){


let status =

(i.status || "")

.toLowerCase()

.trim();


if(

status === "китай"

){


return {

key:"china",

text:"🇨🇳 На складе в Китае"

};


}


if(

status === "в путь" ||

status === "в пути"

){


return {

key:"way",

text:"🚚 В пути"

};


}


if(

status === "офис"

){


return {

key:"office",

text:"🏢 В офисе — можно забрать"

};


}


if(

status === "выдано"

){


return {

key:"issued",

text:"✅ Выдано"

};


}


return {


key:"other",


text:"⏳ Обработка"


};


}



/* =========================
   ФИЛЬТР
========================= */

function setFilter(

type,

button

){


currentFilter = type;


document

.querySelectorAll(

".filterbar button"

)

.forEach(

btn => {


btn.classList.remove(

"active"

);


}

);


if(button){


button.classList.add(

"active"

);


}


renderParcels();


}



/* =========================
   ОТОБРАЖЕНИЕ ПОСЫЛОК
========================= */

function renderParcels(){


let filtered =

allParcels

.filter(

item => {


if(

currentFilter ===

"all"

){


return true;


}


return (

item.status ===

currentFilter

);


}

);


let html = "";


if(

filtered.length === 0

){


html = `


<div

class="card empty"

>


📦 Посылок нет


</div>


`;


}else{


filtered.forEach(

item => {


html += `


<div

class="parcel"

>


📦

<b>

Трек:

</b>


${item.track || "-"}


<br><br>


📊

<b>

Статус:

</b>


${item.statusText || "-"}


<br><br>


💰

<b>

Цена:

</b>


${item.price || 0}

сом


<br><br>


📅

<b>

Дата отправки:

</b>


${item.send_date || "-"}


<br><br>


⏳

<b>

Ожидаемое прибытие:

</b>


${item.expected || "-"}


</div>


`;


}

);


}


document

.getElementById(

"parcelList"

)

.innerHTML = html;


}



/* =========================
   СТРАНИЦА ЕДУ ЗА ПОСЫЛКАМИ
========================= */

function renderPickup(){


const officeParcels =

allParcels

.filter(

item =>

item.status ===

"office"

);


let total = 0;


officeParcels

.forEach(

item => {


total +=

Number(

item.price || 0

);


}

);


let html = "";


if(

officeParcels.length === 0

){


html = `


<div

class="card empty"

>


📦 У вас пока нет посылок,

готовых к выдаче.


<br><br>


Когда ваша посылка

поступит в наш офис,

она появится здесь.


</div>


`;


}else{


html += `


<div

class="ready-box"

>


<div>

📦 Готово к выдаче

</div>


<div

class="ready-number"

>

${officeParcels.length}

</div>


<div>

посылок

</div>


<div

class="total-price"

>

💰 ${total} сом

</div>


</div>


`;


officeParcels

.forEach(

item => {


html += `


<div

class="parcel"

>


📦

<b>

Трек:

</b>


${item.track || "-"}


<br><br>


🏢

<b>

Статус:

</b>


Готово к получению


<br><br>


💰

<b>

К оплате:

</b>


${item.price || 0}

сом


</div>


`;


}

);


}


html += `


<div

class="delivery-info"

>


<h3>

📍 Пункт выдачи Tez Kargo

</h3>


<p>

🏢 Наш адрес в Бишкеке

</p>


<p>

🕘 Время работы:

10:00–18:00

</p>


<button

class="route-btn"

onclick="openRoute()"

>


📍 Открыть Tez Kargo в 2GIS


</button>


<button

class="delivery-btn"

onclick="requestDelivery()"

>


🚕 Заказать доставку домой


</button>


</div>


`;


document

.getElementById(

"pickupContent"

)

.innerHTML = html;


}



/* =========================
   ОТКРЫТЬ 2GIS
========================= */

function openRoute(){


window.open(

"https://2gis.kg/bishkek/geo/70000001110377570",

"_blank"

);


}



/* =========================
   ЗАКАЗАТЬ ДОСТАВКУ
========================= */

function requestDelivery(){


const tg_id =

getTG();


if(!tg_id){


alert(

"Не удалось определить ваш Telegram ID"

);


return;


}


const address =

prompt(

"📍 Напишите ваш адрес для доставки:"

);


if(

!address ||

address.trim() === ""

){


return;


}


const url =

API_URL +

"?action=delivery" +

"&tg_id=" +

encodeURIComponent(tg_id) +

"&address=" +

encodeURIComponent(address);


fetch(url)


.then(

r =>

r.json()

)


.then(

data => {


if(

data &&

data.status ===

"ok"

){


showSuccess(

"✅ Заявка на доставку отправлена!"

);


}else{


alert(

"⚠️ Не удалось отправить заявку"

);


}


}

)


.catch(

error => {


console.log(error);


alert(

"⚠️ Ошибка соединения с сервером"

);


}

);


}



/* =========================
   ЗАГРУЗКА ДАННЫХ
========================= */

function loadClient(){


const tg_id =

getTG();


if(!tg_id){


alert(

"Telegram ID не найден"

);


return;


}



/* =========================
   ПРОФИЛЬ
========================= */

fetch(

API_URL +

"?action=profile&tg_id=" +

encodeURIComponent(tg_id)

)


.then(

r =>

r.json()

)


.then(

data => {


if(

!data ||

data.status !==

"ok"

){


return;


}


document

.querySelector(

".header"

)

.innerHTML =

"👤 Имя: " +

(data.name || "-");


document

.querySelector(

".phone"

)

.innerHTML =

"📱 Телефон: " +

(data.phone ||

"нет данных");


document

.querySelector(

".bonus"

)

.innerHTML =

"💰 Бонус: " +

(data.balance || 0) +

" сом";


document

.querySelector(

".total-bonus"

)

.innerHTML =

"💎 Общий бонус: " +

(data.total_balance || 0) +

" сом";


document

.querySelector(

".code"

)

.innerText =

data.client_code ||

"---";


document

.getElementById(

"warehouseText"

)

.innerText =


`📦 Адрес склада:


${data.address_warehouse ||

"нет данных"}`;



/* УРОВЕНЬ */


let total =

Number(

data.total_balance || 0

);


let level =

"🥉 Бронза";


let levelClass =

"newbie";


if(

total >= 1000

){


level =

"💎 VIP 👑";


levelClass =

"vip";


}


else if(

total >= 800

){


level =

"🥇 Золото";


levelClass =

"gold";


}


else if(

total >= 600

){


level =

"🥈 Серебро";


levelClass =

"silver";


}


const levelBox =

document

.getElementById(

"levelBox"

);


levelBox.className =

"level-box " +

levelClass;


levelBox.innerHTML =

"🏆 Уровень: " +

level;


}

);



/* =========================
   ПОСЫЛКИ
========================= */

fetch(

API_URL +

"?action=all&tg_id=" +

encodeURIComponent(tg_id)

)


.then(

r =>

r.json()

)


.then(

p => {


allParcels = [];


/* OFFICE */


if(

Array.isArray(

p.office

)

){


p.office.forEach(

i => {


allParcels.push({


track:

i.track,


status:

"office",


statusText:

"🏢 В офисе — можно забрать",


price:

i.price,


send_date:

i.date_sent,


expected:

i.date_arrived


});


}

);


}


/* WAY */


if(

Array.isArray(

p.way

)

){


p.way.forEach(

i => {


let st =

getStatus(i);


allParcels.push({


track:

i.track,


status:

st.key,


statusText:

st.text,


price:

i.price,


send_date:

i.date_sent,


expected:

i.date_arrived


});


}

);


}


renderParcels();


renderPickup();


}

)


.catch(

error => {


console.log(error);


document

.getElementById(

"parcelList"

)

.innerHTML = `


<div

class="card"

>


⚠️ Не удалось загрузить посылки.


</div>


`;


}

);


}



/* =========================
   ЗАПУСК
========================= */

window.onload =

loadClient;


</script></body></html>
