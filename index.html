<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tez Kargo PRO Tracking</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef1f6;
}

.header{
    background:#fff;
    padding:12px;
    text-align:center;
    font-weight:bold;
    border-bottom:3px solid #e74c3c;
}

#map{
    height:500px;
    width:100%;
}

.info{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.status{
    font-size:16px;
    font-weight:bold;
}

.small{
    color:#666;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
📦 Tez Kargo PRO Tracking
</div>

<div id="map"></div>

<div class="info">
<div class="status" id="statusText">Загрузка...</div>
<div class="small" id="track">Трек: ---</div>
</div>

<script>

// ================= MAP =================
let map = L.map('map').setView([41.2, 74.8], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// ================= POINTS =================
const china = [39.9042, 116.4074];   // Китай (Пекин)
const bishkek = [42.8746, 74.5698];  // Бишкек

// маршрут
let route = L.polyline([china, bishkek], {
    color:'#e74c3c',
    weight:4
}).addTo(map);

// маркеры
L.marker(china).addTo(map).bindPopup("🇨🇳 Китай склад");
L.marker(bishkek).addTo(map).bindPopup("📍 Бишкек");

// 🚚 иконка машины
let carIcon = L.divIcon({
    className: "",
    html: "🚚",
    iconSize: [30,30]
});

let car = L.marker(china, {icon: carIcon}).addTo(map);

// ================= STATUS =================
function setStatus(status, track){

    if(track){
        document.getElementById("track").innerText = "Трек: " + track;
    }

    let s = (status || "").toLowerCase();

    let progress = 0;
    let text = "⏳ Обработка";

    if(s.includes("китай")){
        progress = 0;
        text = "🇨🇳 Посылка на складе в Китае";
    }
    else if(s.includes("в пути")){
        progress = 0.5;
        text = "🚚 Посылка в пути";
    }
    else if(s.includes("офис")){
        progress = 0.8;
        text = "🏢 Посылка в офисе Бишкек";
    }
    else if(s.includes("выдано")){
        progress = 1;
        text = "📍 Посылка выдана";
    }

    document.getElementById("statusText").innerText = text;

    moveCar(progress);
}

// ================= CAR MOVE =================
function moveCar(p){

    let lat = china[0] + (bishkek[0] - china[0]) * p;
    let lng = china[1] + (bishkek[1] - china[1]) * p;

    car.setLatLng([lat, lng]);

    map.panTo([lat, lng], {animate:true});
}

// ================= TELEGRAM =================
function getTG(){
    try{
        if(window.Telegram && Telegram.WebApp){
            Telegram.WebApp.ready();
            return Telegram.WebApp.initDataUnsafe?.user?.id;
        }
    }catch(e){}
    return null;
}

// ================= LOAD API =================
const API_URL = "https://script.google.com/macros/s/AKfycbwVgYyCu8YuPxqhdkOra1F0FfSENe44ys-Ad_wRdQp3CfuR2ISzlWZ4Irt7_IFz3a_2/exec";

function load(){

    let tg_id = getTG();
    if(!tg_id) tg_id = new URLSearchParams(location.search).get("tg_id");

    if(!tg_id) return;

    fetch(API_URL + "?action=all&tg_id=" + tg_id)
    .then(r=>r.json())
    .then(data=>{

        if(data && data.way && data.way.length){

            let item = data.way[0];

            setStatus(item.status, item.track);

        } else {

            setStatus("китай", "---");
        }
    })
    .catch(()=>{
        setStatus("китай", "---");
    });
}

load();

</script>

</body>
</html>
