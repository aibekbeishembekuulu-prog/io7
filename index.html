<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial;
    background:#eef1f6;
    margin:0;
    padding:15px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    max-width:500px;
    margin:auto;
}

h2{
    text-align:center;
}

.address{
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    margin:10px 0;
    font-size:13px;
}

button{
    background:#2ea6ff;
    color:#fff;
    border:none;
    padding:10px;
    border-radius:8px;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>👤 Личный кабинет</h2>

    <p>👤 Имя: Айбек</p>
    <p>📱 Телефон: 996702263388</p>
    <p>🆔 Клиентский код: <b>T0265</b></p>

    <p>📦 Адрес склада:</p>
    <div class="address">
        刘影（LY388）13845320678 广东省佛山市南海区里水镇岗美工业区10号老船长创意园米莎288库房LY388
    </div>

    <button onclick="copyAddress()">📋 Скопировать адрес</button>

    <p>💰 Бонус: <b id="bonus">15.62</b> сом</p>
    <p>💎 Общий бонус: <b id="total">218.68</b> сом</p>

    <p>🏆 Уровень: <b id="level">---</b></p>
</div>

<script>
let totalBonus = 218.68;

// 🔥 ЛОГИКА УРОВНЕЙ
function getLevel(total) {
    if (total >= 7000) {
        return "VIP 💎";
    } 
    else if (total >= 3000) {
        return "Золото 🥇";
    } 
    else if (total >= 1000) {
        return "Серебро 🥈";
    } 
    else {
        return "Новичок 💚";
    }
}

// 📊 Обновление интерфейса
function updateUI() {
    document.getElementById("level").innerText = getLevel(totalBonus);
}

// 📋 Копирование адреса
function copyAddress() {
    let text = "刘影（LY388）13845320678 广东省佛山市南海区里水镇岗美工业区10号老船长创意园米莎288库房LY388";
    navigator.clipboard.writeText(text);
    alert("Адрес скопирован!");
}

// 🚀 запуск
updateUI();
</script>

</body>
</html>
